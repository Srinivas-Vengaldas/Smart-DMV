#Configuration

paths:
  raw_images: "data/raw"
  results: "results/"

quality_check:
  min_width: 800
  min_height: 1000
  min_blur_score: 1000         
  max_file_size_mb: 20
  allowed_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"


ocr:
  language: "en"
  use_angle_cls: true          
  confidence_threshold: 0.6    

extraction:
  patterns:
    landlord: "by and between\\s+(.+?)\\s*,?\\s*as Agent"
    agent: "Agent[\"']?\\)?\\s*and\\s+(.+?)\\s*\\("
    address: "premises known as\\s+(.+?)\\s*\\(the"
    term: "term of\\s+(.+?)\\s*beginning"
    start_date: "first day of\\s+(.+?)\\s"
    end_date: "last day of\\s+(.+?)\\s*\\(the"
    monthly_rent: "installments of \\$\\s*([\\d,]+)"
    late_fee: "(\\w+ percent \\(\\d+%\\))"
    service_charge: "\\$([\\d.]+)\\s*will be automatically"

signature:
  region_of_interest:          
    top: 0.6                   
    bottom: 1.0
    left: 0.0
    right: 1.0

verification:
  fuzzy_match_threshold: 85    
  required_state: "DC"         
  checks:
    - "name_match"
    - "state_is_dc"
    - "street_match"
    - "zip_match"
    - "city_match"
    - "date_match"
    - "signature_exists"

database:
  host: "localhost"
  port: 5432
  name: "lease_verifier"
  user: "postgres"
  password: "postgres"         

streamlit:
  page_title: "DMV Lease Verification System"
  page_icon: "Home"

api:
  host: "0.0.0.0"
  port: 8000
  title: "DMV Lease Verification API"
  version: "1.0.0"